<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">DevPortfolio</div>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <header id="about">
        <h1>Hi, I'm <span class="highlight">Your Name</span></h1>
        <p>A passionate developer building sleek web experiences.</p>
    </header>

    <section id="skills">
        <h2>Technical Skills</h2>
        <div class="skill-tags">
            <span>HTML5</span> <span>CSS3</span> <span>JavaScript</span> <span>Git</span>
        </div>
    </section>

    <section id="projects">
        <h2>Projects</h2>
        <div class="project-grid">
            <div class="project-card">
                <h3>Project One</h3>
                <p>A cool web app built with JS.</p>
            </div>
        </div>
    </section>

    <footer id="contact">
        <h2>Get In Touch</h2>
        <p>Email: your.email@example.com</p>
        <button id="contactBtn">Click to Say Hi!</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
